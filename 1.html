<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>液态玻璃 · 自我介绍</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <style>
        /* ========== 核心变量 ========== */
        :root {
            --hue-base: 195;
            --mouse-x: 50%;
            --mouse-y: 50%;
            --card-bg-alpha: 0.35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: 'Noto Sans SC', sans-serif;
            /* 动态背景色，使用线性过渡让色彩变化无闪烁 */
            background: hsl(var(--hue-base), 18%, 5%);
            transition: background 0.08s linear;
            overflow: hidden;
            position: relative;
            /* 减少移动端光晕渲染压力 */
            -webkit-tap-highlight-color: transparent;
        }

        /* ========== 液态光晕层 (极致性能优化) ========== */
        .liquid-orbs {
            position: fixed;
            inset: -5%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            /* 移除了 mix-blend-mode 和过大的模糊值，改用透明度与柔光结合 */
            filter: blur(60px);
            will-change: transform;
            transform: translateZ(0);
            opacity: 0.55;
            transition: opacity 0.8s ease;
        }

        /* 使用半透明纯色光晕替代 screen 混合模式，减少 GPU 计算负担 */
        .orb-1 {
            width: 60vmax;
            height: 60vmax;
            top: -15%;
            left: -10%;
            background: hsl(var(--hue-base), 80%, 60%, 0.5);
            animation: floatOrb1 24s ease-in-out infinite alternate;
        }
        .orb-2 {
            width: 55vmax;
            height: 55vmax;
            bottom: -20%;
            right: -10%;
            background: hsl(calc(var(--hue-base) + 60), 75%, 55%, 0.45);
            animation: floatOrb2 28s ease-in-out infinite alternate;
        }
        .orb-3 {
            width: 45vmax;
            height: 45vmax;
            top: 35%;
            left: 45%;
            background: hsl(calc(var(--hue-base) + 120), 70%, 50%, 0.4);
            animation: floatOrb3 32s ease-in-out infinite alternate;
        }
        .orb-4 {
            width: 40vmax;
            height: 40vmax;
            top: 10%;
            right: 5%;
            background: hsl(calc(var(--hue-base) + 180), 75%, 55%, 0.35);
            animation: floatOrb4 20s ease-in-out infinite alternate;
        }
        .orb-5 {
            width: 42vmax;
            height: 42vmax;
            bottom: 10%;
            left: 5%;
            background: hsl(calc(var(--hue-base) + 240), 70%, 50%, 0.4);
            animation: floatOrb5 26s ease-in-out infinite alternate;
        }

        @keyframes floatOrb1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vw, 8vh) scale(1.15); }
        }
        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-8vw, -6vh) scale(1.2); }
        }
        @keyframes floatOrb3 {
            0% { transform: translate(-50%, -20%) scale(1); }
            100% { transform: translate(-40%, 10%) scale(1.25); }
        }
        @keyframes floatOrb4 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-6vw, 7vh) scale(1.1); }
        }
        @keyframes floatOrb5 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(7vw, -5vh) scale(1.15); }
        }

        /* ========== 主卡片 (极致毛玻璃质感) ========== */
        .glass-card {
            position: relative;
            z-index: 10;
            max-width: 440px;
            width: 100%;
            padding: 2.8rem 2.2rem;
            border-radius: 32px;
            /* 半透明深色背景，配合低模糊值实现顺滑的毛玻璃效果 */
            background: rgba(12, 14, 24, var(--card-bg-alpha));
            /* 移动端使用较小的模糊值，桌面端适当增大 */
            backdrop-filter: blur(16px) saturate(150%);
            -webkit-backdrop-filter: blur(16px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.5s ease,
                border-color 0.5s ease;
            will-change: transform;
            transform-style: preserve-3d;
            overflow: hidden;
        }

        .glass-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        /* 动态棱镜边框 (简化以提升性能) */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 32px;
            padding: 1px;
            background: conic-gradient(from 0deg,
                    transparent 0%,
                    hsl(var(--hue-base), 80%, 65%) 15%,
                    hsl(calc(var(--hue-base) + 40), 75%, 60%) 30%,
                    transparent 50%,
                    hsl(calc(var(--hue-base) + 80), 70%, 60%) 70%,
                    hsl(var(--hue-base), 80%, 65%) 85%,
                    transparent 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            animation: rotateBorder 8s linear infinite;
        }

        @keyframes rotateBorder {
            to { transform: rotate(360deg); }
        }

        /* 鼠标跟随光斑 (使用位移实现，避免整卡重绘) */
        .mouse-follower {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            background: radial-gradient(circle 180px at var(--mouse-x) var(--mouse-y), rgba(255, 255, 255, 0.08), transparent 70%);
        }
        .glass-card:hover .mouse-follower {
            opacity: 1;
        }

        .glass-card>* {
            position: relative;
            z-index: 1;
        }

        /* ========== 编辑按钮 ========== */
        .edit-btn {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            z-index: 20;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(4px);
        }
        .edit-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: hsl(var(--hue-base), 80%, 65%);
            color: hsl(var(--hue-base), 80%, 65%);
            transform: scale(1.08);
        }
        .edit-btn.active {
            background: hsl(var(--hue-base), 80%, 65%);
            border-color: hsl(var(--hue-base), 80%, 65%);
            color: #0b0b1a;
            box-shadow: 0 0 30px hsla(var(--hue-base), 80%, 65%, 0.3);
        }
        .edit-btn svg {
            width: 17px;
            height: 17px;
        }

        /* ========== 头像 ========== */
        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 1.4rem;
            cursor: pointer;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .avatar-wrapper::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg,
                    hsl(var(--hue-base), 80%, 65%),
                    hsl(calc(var(--hue-base) + 40), 75%, 60%),
                    hsl(calc(var(--hue-base) + 80), 70%, 60%),
                    hsl(var(--hue-base), 80%, 65%));
            animation: rotate 6s linear infinite;
            opacity: 0.6;
            transition: opacity 0.4s;
        }
        .avatar-wrapper:hover::before {
            opacity: 0.9;
        }
        @keyframes rotate {
            to { transform: rotate(360deg); }
        }
        .avatar-wrapper::after {
            content: '📷 更换头像';
            position: absolute;
            bottom: -32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            opacity: 0;
            transition: opacity 0.4s ease;
            white-space: nowrap;
            letter-spacing: 0.05em;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 12px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            font-weight: 300;
        }
        .avatar-wrapper:hover::after {
            opacity: 1;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2.5px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: #1a1a2e;
        }
        .avatar-wrapper:hover .avatar {
            transform: scale(1.06);
        }
        .avatar-input {
            display: none;
        }

        /* ========== 姓名 & 角色 ========== */
        .name {
            text-align: center;
            font-size: 1.85rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.06em;
            margin-bottom: 0.1rem;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
        }
        .role {
            text-align: center;
            font-size: 0.82rem;
            color: hsl(var(--hue-base), 80%, 65%);
            font-weight: 500;
            margin-bottom: 1.4rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        /* ========== 分隔线 ========== */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            margin: 1.4rem 0;
        }

        /* ========== 座右铭 ========== */
        .motto-section {
            text-align: center;
            margin-bottom: 1.2rem;
            cursor: default;
        }
        .motto-label {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 0.5rem;
            font-weight: 400;
        }
        .motto-text {
            font-size: 1.05rem;
            color: #fff;
            font-weight: 300;
            line-height: 1.7;
            font-style: italic;
            display: inline;
            padding: 0 1.2rem;
            position: relative;
            cursor: pointer;
            transition: color 0.3s;
            letter-spacing: 0.02em;
        }
        .motto-text::before,
        .motto-text::after {
            content: '"';
            color: hsl(var(--hue-base), 80%, 65%);
            font-size: 1.6rem;
            font-family: Georgia, serif;
            position: absolute;
            opacity: 0.6;
            transition: color 0.2s ease;
        }
        .motto-text::before { left: -0.1rem; top: -0.4rem; }
        .motto-text::after { right: -0.1rem; bottom: -0.6rem; }
        .motto-text:hover { color: hsl(var(--hue-base), 80%, 65%); }

        .motto-edit {
            display: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 0.65rem 1rem;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            text-align: center;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .motto-edit:focus {
            border-color: hsl(var(--hue-base), 80%, 65%);
            box-shadow: 0 0 0 3px hsla(var(--hue-base), 80%, 65%, 0.12);
        }
        .motto-hint {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 0.4rem;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .motto-section:hover .motto-hint { opacity: 1; }

        /* ========== 信息网格 ========== */
        .info-grid {
            display: grid;
            gap: 0.6rem;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.55rem 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.4s ease;
        }
        .info-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }
        .info-icon {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: hsl(var(--hue-base), 80%, 65%);
            font-size: 0.9rem;
            flex-shrink: 0;
            transition: color 0.2s ease;
        }
        .info-item:hover .info-icon { background: rgba(255, 255, 255, 0.08); }
        .info-content { flex: 1; min-width: 0; }
        .info-label {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 0.05rem;
            font-weight: 400;
        }
        .info-value {
            font-size: 0.88rem;
            color: #fff;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* ========== 社交链接 ========== */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 0.7rem;
            margin-top: 1.6rem;
            padding-top: 1.4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .social-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            font-size: 1rem;
            backdrop-filter: blur(4px);
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: hsl(var(--hue-base), 80%, 65%);
            color: hsl(var(--hue-base), 80%, 65%);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px hsla(var(--hue-base), 80%, 65%, 0.15);
        }
        .social-btn svg { width: 18px; height: 18px; }

        /* ========== 可编辑样式 ========== */
        .editable {
            cursor: text;
            border-radius: 6px;
            padding: 2px 6px;
            margin: -2px -6px;
            transition: background 0.25s, outline 0.25s;
            outline: none;
        }
        .editable:hover { background: rgba(255, 255, 255, 0.04); }
        .editable[contenteditable="true"] {
            background: rgba(255, 255, 255, 0.06);
            outline: 1.5px solid hsl(var(--hue-base), 80%, 65%);
            border-radius: 6px;
            box-shadow: 0 0 20px hsla(var(--hue-base), 80%, 65%, 0.08);
        }

        /* ========== Toast 提示 ========== */
        .save-toast {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(11, 11, 26, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 0.7rem 1.8rem;
            border-radius: 16px;
            font-size: 0.85rem;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            pointer-events: none;
            font-weight: 400;
            letter-spacing: 0.04em;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        .save-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .save-toast .toast-accent {
            color: hsl(var(--hue-base), 80%, 65%);
            font-weight: 500;
        }

        /* ========== 响应式优化 ========== */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .glass-card {
                backdrop-filter: blur(12px) saturate(120%);
                -webkit-backdrop-filter: blur(12px) saturate(120%);
                border-radius: 24px;
                padding: 2rem 1.4rem;
            }
            .orb { filter: blur(40px); }
            .name { font-size: 1.5rem; }
            .avatar-wrapper { width: 100px; height: 100px; }
            .motto-text { font-size: 0.95rem; padding: 0 0.8rem; }
            .motto-text::before, .motto-text::after { font-size: 1.2rem; }
            .edit-btn { top: 0.8rem; right: 0.8rem; width: 34px; height: 34px; }
        }

        @media (max-width: 480px) {
            .glass-card {
                backdrop-filter: blur(8px) saturate(110%);
                -webkit-backdrop-filter: blur(8px) saturate(110%);
                padding: 1.6rem 1rem;
            }
            .info-item { padding: 0.45rem 0.7rem; }
            .social-btn { width: 36px; height: 36px; }
        }
    </style>
</head>
<body>

    <!-- 液态光晕背景 -->
    <div class="liquid-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>

    <!-- 主卡片 -->
    <div class="glass-card" id="profileCard">
        <!-- 性能优化过的鼠标跟随光斑 -->
        <div class="mouse-follower" aria-hidden="true"></div>

        <!-- 编辑按钮 -->
        <button class="edit-btn" id="editBtn" title="切换编辑模式">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        </button>

        <!-- 头像 -->
        <div class="avatar-wrapper" id="avatarWrapper">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=default&backgroundColor=b6e3f4" alt="头像" class="avatar" id="avatarImg" />
            <input type="file" class="avatar-input" id="avatarInput" accept="image/*" />
        </div>

        <!-- 姓名 & 角色 -->
        <div class="name editable" id="nameField" contenteditable="false">林一</div>
        <div class="role editable" id="roleField" contenteditable="false">创意开发者 · 设计师</div>

        <div class="divider"></div>

        <!-- 座右铭 -->
        <div class="motto-section" id="mottoSection">
            <div class="motto-label">✦ 座右铭</div>
            <div class="motto-text" id="mottoText">保持好奇，永远在路上</div>
            <input type="text" class="motto-edit" id="mottoInput" value="保持好奇，永远在路上" maxlength="30" />
            <div class="motto-hint">✎ 点击编辑</div>
        </div>

        <div class="divider"></div>

        <!-- 信息 -->
        <div class="info-grid">
            <div class="info-item">
                <div class="info-icon">📍</div>
                <div class="info-content">
                    <div class="info-label">所在地</div>
                    <div class="info-value editable" id="locationField" contenteditable="false">中国 · 杭州</div>
                </div>
            </div>
            <div class="info-item">
                <div class="info-icon">💼</div>
                <div class="info-content">
                    <div class="info-label">职业</div>
                    <div class="info-value editable" id="jobField" contenteditable="false">全栈工程师</div>
                </div>
            </div>
            <div class="info-item">
                <div class="info-icon">✉️</div>
                <div class="info-content">
                    <div class="info-label">邮箱</div>
                    <div class="info-value editable" id="emailField" contenteditable="false">linyi@creativ.space</div>
                </div>
            </div>
        </div>

        <!-- 社交链接 -->
        <div class="social-links">
            <a href="#" class="social-btn" title="GitHub">

            </a>
            <a href="#" class="social-btn" title="Twitter">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            <a href="#" class="social-btn" title="邮箱">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
            </a>
            <a href="#" class="social-btn" title="个人网站">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            </a>
        </div>
    </div>

    <!-- Toast -->
    <div class="save-toast" id="saveToast">
        <span class="toast-accent">●</span> 已保存更改
    </div>

    <script>
        (function() {
            // ============================================================
            // 极简流畅的色彩引擎 (Lerp平滑算法)
            // ============================================================
            const root = document.documentElement;
            const card = document.getElementById('profileCard');
            const follower = card.querySelector('.mouse-follower');

            let currentHue = 195;      // 当前实际色相
            let targetHue = 195;      // 目标色相
            let viewportX = 0.5;      // 鼠标视口水平位置 (0-1)

            // 视口鼠标追踪 (使用 RAF 节流，避免过度更新)
            let rafId = null;
            let targetViewportX = 0.5;

            function updateMousePosition(clientX) {
                targetViewportX = clientX / window.innerWidth;
            }

            document.addEventListener('mousemove', (e) => {
                updateMousePosition(e.clientX);
            });

            // 移动端触摸支持，使用 passive 模式防止滚动卡顿
            document.addEventListener('touchmove', (e) => {
                updateMousePosition(e.touches[0].clientX);
            }, { passive: true });

            document.addEventListener('mouseleave', () => {
                targetViewportX = 0.5; // 鼠标离开屏幕，色彩回归中心
            });

            // 核心动画循环：使用线性插值(Lerp)实现极致顺滑的色彩过渡
            function animate() {
                // 视口位置平滑插值
                viewportX += (targetViewportX - viewportX) * 0.08;
                
                // 将鼠标横坐标映射到 0-360 度的色相环
                targetHue = viewportX * 360;
                
                // 色相平滑插值 (解决色彩跳跃闪烁的关键)
                currentHue += (targetHue - currentHue) * 0.06;
                
                // 更新CSS变量，浏览器会高效处理依赖此变量的所有样式
                root.style.setProperty('--hue-base', currentHue);
                
                rafId = requestAnimationFrame(animate);
            }

            // 卡片内部鼠标跟随光斑 (独立处理，避免整卡重绘)
            card.addEventListener('pointermove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // 直接设置像素值，触发GPU加速的位移
                card.style.setProperty('--mouse-x', x + 'px');
                card.style.setProperty('--mouse-y', y + 'px');
            });

            card.addEventListener('pointerleave', () => {
                // 鼠标离开卡片，光斑回归中心
                card.style.setProperty('--mouse-x', '50%');
                card.style.setProperty('--mouse-y', '50%');
            });

            // ============================================================
            // 编辑功能 (保持不变)
            // ============================================================
            const editBtn = document.getElementById('editBtn');
            const avatarWrapper = document.getElementById('avatarWrapper');
            const avatarInput = document.getElementById('avatarInput');
            const avatarImg = document.getElementById('avatarImg');
            const mottoSection = document.getElementById('mottoSection');
            const mottoText = document.getElementById('mottoText');
            const mottoInput = document.getElementById('mottoInput');
            const saveToast = document.getElementById('saveToast');
            const editableElements = document.querySelectorAll('.editable');

            let isEditMode = false;

            function showToast(message) {
                const toast = saveToast;
                toast.innerHTML = message || '<span class="toast-accent">●</span> 已保存更改';
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
            }

            function setEditMode(enabled) {
                isEditMode = enabled;
                editBtn.classList.toggle('active', enabled);
                editableElements.forEach(el => {
                    el.contentEditable = enabled;
                    el.style.cursor = enabled ? 'text' : 'default';
                });
            }

            editBtn.addEventListener('click', () => {
                setEditMode(!isEditMode);
                showToast(isEditMode ? '✎ 编辑模式已开启' : '✓ 已保存更改');
            });

            avatarWrapper.addEventListener('click', () => avatarInput.click());
            avatarInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { 
                        avatarImg.src = ev.target.result;
                        showToast('📷 头像已更新'); 
                    };
                    reader.readAsDataURL(file);
                }
            });

            mottoSection.addEventListener('click', (e) => {
                if (e.target === mottoInput || isEditMode) return;
                mottoText.style.display = 'none';
                mottoInput.style.display = 'block';
                mottoInput.focus();
                mottoInput.select();
            });

            function saveMotto() {
                const val = mottoInput.value.trim() || '保持好奇，永远在路上';
                mottoText.textContent = val;
                mottoText.style.display = 'block';
                mottoInput.style.display = 'none';
                showToast('✎ 座右铭已更新');
            }

            mottoInput.addEventListener('blur', saveMotto);
            mottoInput.addEventListener('keydown', (e) => { 
                if (e.key === 'Enter') {
                    e.preventDefault();
                    mottoInput.blur();
                }
            });

            editableElements.forEach(el => {
                el.addEventListener('blur', () => { 
                    if (isEditMode) showToast('✓ 已保存'); 
                });
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (mottoInput.style.display === 'block') {
                        saveMotto();
                        return;
                    }
                    if (isEditMode) {
                        setEditMode(false);
                        showToast('已退出编辑');
                    }
                }
            });

            // ============================================================
            // 启动引擎
            // ============================================================
            requestAnimationFrame(animate);
            console.log('🌊 液态玻璃 · 顺滑性能版已启动 (Lerp算法优化)');
        })();
    </script>
</body>
